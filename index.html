<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Henslow Farm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet" />
  <meta property="og:title" content="Henslow Farm" />
  <meta property="og:description" content="Where pasture thrives — so does everything on it." />
  <meta property="og:image" content="https://henslowfarm.com/og-image.png" />
  <meta property="og:url" content="https://henslowfarm.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:  #18130e;
      --straw: #b89a58;
      --sage:  #7a8a62;
      --cream: #f2ece0;
    }

    body {
      font-family: 'Karla', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .sparrow {
      width: 120px;
      height: 120px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: rise 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 10vw, 6.5rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }

    .rule {
      width: 40px;
      height: 1px;
      background: var(--straw);
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: rise 0.8s ease 0.65s forwards;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      color: var(--straw);
      letter-spacing: 0.04em;
      line-height: 1.5;
      max-width: 440px;
      opacity: 0;
      animation: rise 0.8s ease 0.75s forwards;
    }

    .signup {
      margin-top: 3.5rem;
      opacity: 0;
      animation: rise 0.8s ease 1.1s forwards;
      width: 100%;
      max-width: 380px;
    }

    .signup-label {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 1rem;
    }

    .signup-row {
      display: flex;
      border: 1px solid rgba(184,154,88,0.3);
    }

    .signup-row input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.75rem 1rem;
      font-family: 'Karla', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      min-width: 0;
    }

    .signup-row input::placeholder {
      color: rgba(242,236,224,0.25);
    }

    .signup-row button {
      background: transparent;
      border: none;
      border-left: 1px solid rgba(184,154,88,0.3);
      padding: 0.75rem 1.1rem;
      font-family: 'Karla', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--straw);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .signup-row button:hover {
      background: rgba(184,154,88,0.08);
    }

    footer {
      padding: 2.5rem 2rem;
      text-align: center;
      opacity: 0;
      animation: rise 0.8s ease 1.25s forwards;
    }

    .footer-location {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(242,236,224,0.25);
      margin-bottom: 0.5rem;
    }

    .footer-contact a {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(184,154,88,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-contact a:hover {
      color: var(--straw);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      main { padding: 3rem 1.5rem; }
      .sparrow { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>

<main>

  <svg class="sparrow" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-label="Henslow's sparrow">
    <line x1="60" y1="118" x2="60" y2="62" stroke="#7a8a62" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="95"  x2="50" y2="82" stroke="#7a8a62" stroke-width="1"   stroke-linecap="round"/>
    <line x1="60" y1="86"  x2="70" y2="75" stroke="#7a8a62" stroke-width="1"   stroke-linecap="round"/>
    <ellipse cx="60" cy="67" rx="16" ry="10" fill="#7a5c38" transform="rotate(-8 60 67)"/>
    <ellipse cx="61" cy="70" rx="13" ry="7"  fill="#55401e" transform="rotate(-6 61 70)"/>
    <line x1="52" y1="67" x2="59" y2="72" stroke="#b89a58" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="55" y1="64" x2="62" y2="69" stroke="#b89a58" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="58" y1="62" x2="65" y2="67" stroke="#b89a58" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="68" cy="72" rx="8" ry="6" fill="#c4986a" transform="rotate(12 68 72)"/>
    <line x1="66" y1="68" x2="67" y2="74" stroke="#55401e" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
    <line x1="69" y1="67" x2="70" y2="73" stroke="#55401e" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
    <path d="M47 71 Q41 76 39 83 Q44 78 46 84 Q49 77 47 71Z" fill="#3d2b14"/>
    <ellipse cx="74" cy="61" rx="10" ry="8" fill="#6a7a48"/>
    <path d="M68 55 Q74 51 80 54" stroke="#1e1710" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M69 58 Q74 54 79 57" stroke="#b89a58" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M68 61 Q74 59 80 62" stroke="#1e1710" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <circle cx="78" cy="59" r="2"   fill="#1e1710"/>
    <circle cx="78.6" cy="58.4" r="0.6" fill="rgba(255,255,255,0.55)"/>
    <path d="M83 61 L91 62 L83 65Z" fill="#b8a860"/>
    <line x1="83" y1="63" x2="90" y2="63" stroke="#8a7840" stroke-width="0.5"/>
    <path d="M60 76 L57 82 M60 76 L63 82" stroke="#7a5c38" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M57 82 L54 85 M57 82 L58 86" stroke="#7a5c38" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M63 82 L61 85 M63 82 L65 86" stroke="#7a5c38" stroke-width="0.9" stroke-linecap="round"/>
  </svg>

  <h1>Henslow Farm</h1>
  <div class="rule"></div>
  <p class="tagline">Where pasture thrives — so does everything on it.</p>

  <div class="signup">
    <p class="signup-label">Be the first to know</p>
    <form class="signup-row" action="https://formspree.io/f/xdabbbel" method="POST">
      <input type="email" name="email" placeholder="your@email.com" required />
      <button type="submit">Notify me</button>
    </form>
  </div>

</main>

<footer>
  <p class="footer-location">1333 Ridge Rd &nbsp;·&nbsp; Pottstown, PA 19465</p>
  <p class="footer-contact"><a href="mailto:info@henslowfarm.com">info@henslowfarm.com</a></p>
</footer>

<script>
  function handleSignup() {
    const input = document.getElementById('email-input');
    const btn = input.nextElementSibling;
    if (!input.value || !input.value.includes('@')) {
      input.focus();
      return;
    }
    btn.textContent = 'Done';
    btn.style.color = '#7a8a62';
    input.value = '';
    input.disabled = true;
    btn.disabled = true;
  }
</script>

</body>
</html>
